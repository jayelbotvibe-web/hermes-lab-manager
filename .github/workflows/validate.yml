name: Validate HTML
on:
  push:
    paths:
      - 'index.html'
  pull_request:
    paths:
      - 'index.html'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HTML5 Validator
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: false
